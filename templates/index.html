<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MEDCHAT</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Segoe UI", sans-serif;
      }

      body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;

        background:
          linear-gradient(rgba(10, 110, 189, 0.85), rgba(13, 202, 240, 0.85)),
          url("https://www.transparenttextures.com/patterns/medical-cross.png"),
          url("https://images.unsplash.com/photo-1579684385127-1ef15d508118");

        background-size: cover, 200px, cover;
        background-position: center;
        background-blend-mode: overlay;

        animation: bgShift 12s ease-in-out infinite alternate;
      }

      @keyframes bgShift {
        0% {
          background-position: center;
        }
        100% {
          background-position: top;
        }
      }

      /* 🔥 History Button */
      .history-btn {
        position: absolute;
        top: 15px;
        right: 20px;
        z-index: 10;

        background: linear-gradient(135deg, #0a6ebd, #0dcaf0);
        color: white;
        padding: 10px 18px;
        border-radius: 10px;
        border: none;
        cursor: pointer;
        font-weight: bold;

        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        transition: 0.3s;
      }

      .history-btn:hover {
        transform: scale(1.05);
      }

      /* Chat Container */
      .chat-container {
        width: 400px;
        height: 630px;
        position: relative;
        z-index: 1;

        background: rgba(255, 255, 255, 0.85);
        backdrop-filter: blur(18px);

        border-radius: 20px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);

        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      /* ECG animation */
      .ecg-line {
        position: absolute;
        width: 100%;
        height: 100%;
        background: url("https://i.imgur.com/8fK4h6G.png") repeat-x;
        opacity: 0.05;
        animation: ecgMove 8s linear infinite;
      }

      @keyframes ecgMove {
        from {
          background-position-x: 0;
        }
        to {
          background-position-x: 1000px;
        }
      }

      /* Header */
      .chat-container h2 {
        background: linear-gradient(135deg, #0a6ebd, #0dcaf0);
        color: white;
        padding: 15px;
        font-size: 18px;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .chat-container h2 img {
        width: 32px;
        height: 32px;
        border-radius: 50%;
      }

      /* Chat box */
      .chat-box {
        flex: 1;
        padding: 15px;
        overflow-y: auto;
        background: url("https://www.transparenttextures.com/patterns/cubes.png");
        display: flex;
        flex-direction: column;
        scroll-behavior: smooth;
      }

      /* Messages */
      .message {
        margin-bottom: 14px;
        max-width: 75%;
        padding: 12px 16px;
        border-radius: 16px;
        font-size: 14px;
        line-height: 1.5;
      }

      .user-message {
        background: linear-gradient(135deg, #0a6ebd, #0dcaf0);
        color: white;
        align-self: flex-end;
        border-bottom-right-radius: 4px;
      }

      .bot-message {
        background: white;
        color: #333;
        align-self: flex-start;
        border: 1px solid #e0e0e0;
        border-bottom-left-radius: 4px;
        white-space: pre-wrap;
      }

      /* Input */
      .input-area {
        display: flex;
        border-top: 1px solid #ddd;
        background: #fff;
      }

      input {
        border: none;
        padding: 14px;
        outline: none;
        width: 75%;
      }

      button {
        width: 25%;
        border: none;
        background: linear-gradient(135deg, #0a6ebd, #0dcaf0);
        color: white;
        cursor: pointer;
      }

      button:hover {
        opacity: 0.9;
      }
    </style>
  </head>

  <body>
    <!-- ✅ HISTORY BUTTON -->
    <button class="history-btn" onclick="window.location.href = '/history'">
      📜 History
    </button>

    <div class="ecg-line"></div>

    <div class="chat-container">
      <h2>
        <img src="https://cdn-icons-png.flaticon.com/512/387/387561.png" />
        MedAI Assistant
      </h2>

      <div id="chat-box" class="chat-box"></div>

      <div class="input-area">
        <input
          type="search"
          id="user-input"
          placeholder="Enter your medical query..." />
        <button onclick="sendMessage()">🔍</button>
      </div>
    </div>

    <script>
      function typeText(element, text, speed = 20) {
        let i = 0;
        element.textContent = "";

        function typing() {
          if (i < text.length) {
            element.textContent += text.charAt(i);
            i++;
            chatBox.scrollTop = chatBox.scrollHeight;
            setTimeout(typing, speed);
          }
        }
        let chatBox = document.getElementById("chat-box");
        typing();
      }

      async function sendMessage() {
        let input = document.getElementById("user-input");
        let message = input.value.trim();
        if (!message) return;

        let chatBox = document.getElementById("chat-box");

        let userMsg = document.createElement("div");
        userMsg.classList.add("message", "user-message");
        userMsg.innerText = message;
        chatBox.appendChild(userMsg);

        input.value = "";

        let botMsg = document.createElement("div");
        botMsg.classList.add("message", "bot-message");
        botMsg.innerText = "Typing...";
        chatBox.appendChild(botMsg);

        chatBox.scrollTop = chatBox.scrollHeight;

        try {
          const res = await fetch(window.location.origin + "/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ message: message }),
          });

          const data = await res.json();

          setTimeout(() => {
            typeText(botMsg, data.response || "No response", 20);
          }, 300);
        } catch {
          botMsg.innerText = "Connection error";
        }
      }

      document
        .getElementById("user-input")
        .addEventListener("keypress", function (e) {
          if (e.key === "Enter") sendMessage();
        });
    </script>
  </body>
</html>
